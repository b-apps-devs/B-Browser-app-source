<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-Browser</title>
<style>
  :root{
    --frame:#0d0e10;
    --titlebar:#17181c;
    --toolbar:#1d1f24;
    --sidebar:#17181c;
    --line:#2a2c32;
    --ink:#e9eaec;
    --muted:#8b8f97;
    --accent:#35e0d0;
    --accent-dim:#1f8f86;
    --content-bg:#ffffff;
    --red:#ff5f57;
    --amber:#febc2e;
    --green:#28c840;
  }
  /* Light theme overrides */
  :root.light{
    --frame:#f5f6f7;
    --titlebar:#ffffff;
    --toolbar:#ffffff;
    --sidebar:#ffffff;
    --line:#e6e6e8;
    --ink:#111214;
    --muted:#6b6f75;
    --content-bg:#ffffff;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:#000;
    font-family:'Segoe UI',ui-sans-serif,system-ui,-apple-system,Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  #app{
    width:100vw;
    height:100vh;
    padding:14px;
    display:flex;
  }
  #shell{
    flex:1;
    display:flex;
    flex-direction:column;
    background:var(--frame);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    border:1px solid #050505;
  }

  /* Title bar */
  .titlebar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 14px;
    background:var(--titlebar);
    border-bottom:1px solid var(--line);
  }
  .traffic{display:flex;gap:8px;flex:0 0 auto;}
  .traffic button{
    width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;padding:0;
    transition:transform 0.15s ease;
  }
  .traffic .close{background:var(--red);}
  .traffic .minimize{background:var(--amber);}
  .traffic .maximize{background:var(--green);}
  .traffic button:hover{filter:brightness(1.15);transform:scale(1.1);}

  /* Tabs - rounded modern look */
  .tabs{
    flex:1;
    display:flex;
    align-items:flex-end;
    gap:8px;
    overflow-x:auto;
    scrollbar-width:none;
    padding:8px 8px 6px 8px;
    border-radius:999px;
    background:transparent;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    max-width:220px;
    min-width:100px;
    background:rgba(16,17,21,0.5);
    color:var(--muted);
    border-radius:14px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    flex:0 0 auto;
    border:1px solid rgba(42,44,50,0.6);
    border-bottom:none;
    backdrop-filter: blur(6px);
  }
  .tab.active{
    background:var(--content-bg);
    color:#1c1d1f;
    box-shadow:0 8px 18px rgba(0,0,0,.28);
  }
  .tab img.favicon{width:14px;height:14px;border-radius:3px;flex:0 0 auto;}
  .tab .t-title{overflow:hidden;text-overflow:ellipsis;flex:1;}
  .tab .t-close{
    opacity:0;flex:0 0 auto;width:18px;height:18px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;
  }
  .tab:hover .t-close{opacity:.8;}
  .tab .t-close:hover{opacity:1;background:rgba(128,128,128,.18);}
  
  .tab-add{
    flex:0 0 auto;width:34px;height:34px;border-radius:10px;border:none;
    background:transparent;color:var(--muted);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;margin-bottom:4px;
  }
  .tab-add:hover{background:#232530;color:var(--ink);}

  .brand{
    flex:0 0 auto;
    display:flex;align-items:center;
    background:#f2f2f3;
    border-radius:999px;
    padding:5px 14px;
  }
  .brand img{height:14px;width:auto;}

  /* Toolbar */
  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 14px;
    background:var(--toolbar);
    border-bottom:1px solid var(--line);
  }
  .nav-btn{
    width:30px;height:30px;border-radius:50%;border:none;background:#26282f;
    color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:14px;flex:0 0 auto;
  }
  .nav-btn:hover:not(:disabled){background:#31333c;color:var(--ink);}
  .nav-btn:disabled{opacity:.35;cursor:default;}

  .address-wrap{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    background:#26282f;
    border-radius:999px;
    padding:0 8px 0 14px;
    height:36px;
    min-width:0;
  }
  .address-wrap svg{flex:0 0 auto;opacity:.6;}
  #address{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    font-size:13px;
    min-width:0;
  }
  #address::placeholder{color:var(--muted);}
  
  .star-btn{
    flex:0 0 auto;width:26px;height:26px;border:none;background:transparent;
    color:var(--muted);cursor:pointer;font-size:15px;border-radius:8px;
  }
  .star-btn.active{color:var(--accent);}
  .star-btn:hover{background:rgba(255,255,255,.04);} 

  .ext-btn{
    flex:0 0 auto;height:34px;padding:0 14px;border-radius:999px;border:none;
    background:#26282f;color:var(--muted);font-size:12px;cursor:pointer;
  }
  .ext-btn:hover{background:#31333c;color:var(--ink);}

  /* Body */
  .body{flex:1;display:flex;min-height:0;}
  .sidebar{
    width:64px;
    background:var(--sidebar);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:12px 0;
    gap:10px;
    overflow-y:auto;
  }
  .bm{
    width:40px;height:40px;border-radius:12px;background:#26282f;border:none;
    cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;
    flex:0 0 auto;color:var(--muted);font-size:15px;
  }
  .bm:hover{background:#31333c;}
  .bm img{width:100%;height:100%;object-fit:cover;border-radius:8px}
  .bm-add{
    margin-top:auto;border:1.5px dashed #3a3c44;background:transparent;color:var(--muted);
  }
  .bm-add:hover{border-color:var(--accent);color:var(--accent);} 
  .bm-settings{margin-top:auto;background:transparent;border:1px solid rgba(255,255,255,.03)}

  .content{flex:1;position:relative;background:var(--content-bg);} 
  .content iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff;display:none;
  }
  .content iframe.active{display:block;}

  .newtab{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:linear-gradient(180deg,#fafafa,#f1f1f2);
  }
  .newtab.active{display:flex;}
  .newtab p{color:#8a8d93;font-size:13.5px;margin:0;}

  .fallback{
    position:absolute;bottom:14px;right:14px;background:#1d1f24;color:var(--ink);
    padding:9px 13px;border-radius:10px;font-size:12px;display:none;align-items:center;gap:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:5;
  }
  .fallback.show{display:flex;}
  .fallback a{color:var(--accent);text-decoration:none;font-weight:600;}
  .fallback button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;}

  /* Settings modal */
  .modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--frame);color:var(--ink);padding:18px;border-radius:12px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:50;min-width:320px}
  .modal h3{margin:0 0 8px 0}
  .modal .row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
  .modal .close{position:absolute;right:10px;top:8px;border:none;background:transparent;color:var(--muted);cursor:pointer}

  @media (max-width:640px){
    .sidebar{width:46px;}
    .bm{width:32px;height:32px;border-radius:8px;}
    .brand{display:none;}
    .ext-btn{display:none;}
  }
</style>
</head>
<body>
<div id="app"><div id="shell">

  <!-- SETUP WIZARD (kept) -->
  <div id="setup">
    <div class="su-titlebar">
      <div class="traffic">
        <button class="close"></button><button class="minimize"></button><button class="maximize"></button>
      </div>
    </div>
    <div class="su-body">
      <div class="su-screen active" data-screen="1">
        <p class="su-eyebrow">Welcome to</p>
        <h1>B-Browser</h1>
        <div><button class="su-btn" id="btnStart">Get Started</button></div>
      </div>
      <div class="su-screen" data-screen="2">
        <h1>Choose Search Engine</h1>
        <div class="engine-list" id="engineList"></div>
      </div>
      <div class="su-screen" data-screen="3">
        <h1>Ready to Browse</h1>
        <p style="color:#8a8d93;">Start browsing the web</p>
        <div><button class="su-btn" id="btnFinish">Start Browsing</button></div>
      </div>
    </div>
  </div>

  <!-- BROWSER -->
  <div class="titlebar">
    <div class="traffic">
      <button class="close" id="tlClose" title="Close"></button>
      <button class="minimize" id="tlMin" title="Minimize"></button>
      <button class="maximize" id="tlMax" title="Maximize"></button>
    </div>
    <div class="tabs" id="tabs"></div>
    <button class="tab-add" id="addTab">+</button>
    <div class="brand"><span style="color:#0d0e10;font-weight:700;font-size:11px;">B</span></div>
  </div>

  <div class="toolbar">
    <button class="nav-btn" id="btnBack">❮</button>
    <button class="nav-btn" id="btnFwd">❯</button>
    <button class="nav-btn" id="btnReload">⟳</button>
    <div class="address-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="address" placeholder="Search or enter URL" autocomplete="off" spellcheck="false"/>
      <button class="star-btn" id="btnStar">★</button>
    </div>
    <button class="ext-btn" id="btnAccount">Login</button>
  </div>

  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="fallback" id="fallback">
        <span>Can't load in-page.</span>
        <a id="fallbackLink" href="#" target="_blank">Open ↗</a>
        <button id="fallbackClose">✕</button>
      </div>
    </div>
  </div>

</div></div>

<!-- Settings modal -->
<div id="settingsModal" style="display:none">
  <div class="modal" id="settings" role="dialog">
    <button class="close" id="settingsClose">✕</button>
    <h3>Settings</h3>
    <div class="row"><span>Theme</span><div><button id="themeToggle">Toggle</button></div></div>
    <div class="row"><span>Ad Blocker</span><label><input type="checkbox" id="adblockToggle"/></label></div>
    <div class="row"><span>Search Engine</span><select id="engineSelect"></select></div>
    <div class="row"><span>Auto Update</span><button id="checkUpdates">Check</button></div>
  </div>
</div>

<script>
(function(){
  var ENGINES = {
    google: {name:"Google", url:function(q){return "https://www.google.com/search?q="+encodeURIComponent(q);}},
    duckduckgo: {name:"DuckDuckGo", url:function(q){return "https://duckduckgo.com/?q="+encodeURIComponent(q);}},
    bing: {name:"Bing", url:function(q){return "https://www.bing.com/search?q="+encodeURIComponent(q);}},
    yahoo: {name:"Yahoo", url:function(q){return "https://search.yahoo.com/search?p="+encodeURIComponent(q);}},
    wikipedia: {name:"Wikipedia", url:function(q){return "https://en.wikipedia.org/wiki/Special:Search?search="+encodeURIComponent(q);}}
  };
  var ENGINE_ORDER = ["google","duckduckgo","bing","yahoo","wikipedia"];

  var state = {
    engine: localStorage.getItem('bb_engine')||"google",
    tabs: [],
    activeId: null,
    nextId: 1,
    bookmarks: JSON.parse(localStorage.getItem('bb_bookmarks')||null) || [{title:"Wiki", url:"https://en.wikipedia.org"},{title:"News", url:"https://news.ycombinator.com"}],
    adblock: (localStorage.getItem('bb_adblock')==='true'),
    loggedIn: !!localStorage.getItem('bb_user'),
    user: localStorage.getItem('bb_user')||null
  };

  var $ = function(id){return document.getElementById(id);};
  var tabsEl = $("tabs"), contentEl = $("content"), sidebarEl = $("sidebar");
  var addressEl = $("address"), fallbackEl = $("fallback"), fallbackLink = $("fallbackLink");

  function hostname(u){try{return new URL(u).hostname;}catch(e){return"";}}
  function faviconFor(u){var h=hostname(u);return h?"https://www.google.com/s2/favicons?sz=64&domain="+h:"";}
  function looksLikeUrl(s){s=s.trim();if(/^https?:\/\//i.test(s))return true;if(/^[a-z0-9.-]+(\.[a-z]{2,})+/i.test(s))return true;return false;}
  function normalizeUrl(s){s=s.trim();if(/^https?:\/\//i.test(s))return s;return"https://"+s;}
  function resolveInput(s){s=s.trim();if(!s)return null;if(looksLikeUrl(s))return normalizeUrl(s);var e=ENGINES[state.engine];return e&&e.url?e.url(s):"https://www.google.com/search?q="+encodeURIComponent(s);} 

  function newTabObj(url){var id=state.nextId++;return{id:id,url:url||"",title:url?hostname(url):"New tab",history:[],histIndex:-1,iframe:null,node:null};}
  
  function createTab(url){
    var tab=newTabObj(url);
    state.tabs.push(tab);
    var page;
    if(url){
      page=document.createElement("iframe");
      page.setAttribute("referrerpolicy","no-referrer");
      contentEl.appendChild(page);
      tab.iframe=page;
      tab.history.push(url);
      tab.histIndex=0;
      page.src = url;
    }else{
      page=document.createElement("div");
      page.className="newtab";
      page.innerHTML="<p>New Tab</p>";
      contentEl.appendChild(page);
      tab.node=page;
    }
    tab.pageEl=page;
    switchTab(tab.id);
    persistState();
    return tab;
  }

  function findTab(id){for(var i=0;i<state.tabs.length;i++)if(state.tabs[i].id===id)return state.tabs[i];return null;}

  function switchTab(id){
    state.activeId=id;
    state.tabs.forEach(function(t){t.pageEl.classList.toggle("active",t.id===id);});
    renderTabs();
    var tab=findTab(id);
    if(tab){addressEl.value=tab.url||"";$("btnStar").classList.toggle("active",!!tab.starred);}
    updateNavButtons();
    fallbackEl.classList.remove("show");
    persistState();
  }

  function closeTab(id){
    var idx=state.tabs.findIndex(function(t){return t.id===id;});
    if(idx===-1)return;
    var tab=state.tabs[idx];
    if(tab.pageEl)tab.pageEl.remove();
    state.tabs.splice(idx,1);
    if(state.tabs.length===0){createTab(null);return;}
    if(state.activeId===id){switchTab(state.tabs[Math.max(0,idx-1)].id);}else{renderTabs();}
    persistState();
  }

  function renderTabs(){
    tabsEl.innerHTML="";
    state.tabs.forEach(function(t){
      var el=document.createElement("div");
      el.className="tab"+(t.id===state.activeId?" active":"");
      var fav=document.createElement("img");
      fav.className="favicon";
      fav.src=t.url?faviconFor(t.url):"";
      fav.onerror=function(){this.style.visibility="hidden";};
      if(!t.url)fav.style.visibility="hidden";
      var title=document.createElement("span");
      title.className="t-title";
      title.textContent=t.title||"New tab";
      var close=document.createElement("span");
      close.className="t-close";
      close.textContent="✕";
      close.onclick=function(e){e.stopPropagation();closeTab(t.id);};
      el.appendChild(fav);el.appendChild(title);el.appendChild(close);
      el.onclick=function(){switchTab(t.id);};
      tabsEl.appendChild(el);
    });
  }

  function navigate(input,pushHistory){
    var url=resolveInput(input);
    if(!url)return;
    var tab=findTab(state.activeId);
    if(!tab)return;
    if(tab.node&&!tab.iframe){
      var page=document.createElement("iframe");
      page.setAttribute("referrerpolicy","no-referrer");
      contentEl.appendChild(page);
      tab.pageEl.remove();
      tab.pageEl=page;
      tab.iframe=page;
      tab.node=null;
      page.classList.add("active");
    }
    if(pushHistory!==false){tab.history=tab.history.slice(0,tab.histIndex+1);tab.history.push(url);tab.histIndex=tab.history.length-1;}
    tab.url=url;
    tab.title=hostname(url)||url;
    if(tab.iframe)tab.iframe.src=url;
    addressEl.value=url;
    renderTabs();
    updateNavButtons();
    tab.starred=state.bookmarks.some(function(b){return b.url===url;});
    $("btnStar").classList.toggle("active",tab.starred);
    fallbackEl.classList.add("show");
    clearTimeout(navigate._t);
    navigate._t=setTimeout(function(){fallbackEl.classList.remove("show");},6000);
    persistState();
  }

  function updateNavButtons(){
    var tab=findTab(state.activeId);
    $("btnBack").disabled=!tab||tab.histIndex<=0;
    $("btnFwd").disabled=!tab||tab.histIndex>=tab.history.length-1;
  }

  function goBack(){var tab=findTab(state.activeId);if(!tab||tab.histIndex<=0)return;tab.histIndex--;var url=tab.history[tab.histIndex];tab.url=url;tab.title=hostname(url);if(tab.iframe)tab.iframe.src=url;addressEl.value=url;updateNavButtons();persistState();}
  function goForward(){var tab=findTab(state.activeId);if(!tab||tab.histIndex>=tab.history.length-1)return;tab.histIndex++;var url=tab.history[tab.histIndex];tab.url=url;tab.title=hostname(url);if(tab.iframe)tab.iframe.src=url;addressEl.value=url;updateNavButtons();persistState();}
  function reload(){var tab=findTab(state.activeId);if(!tab||!tab.iframe)return;tab.iframe.src=tab.iframe.src;}

  function renderSidebar(){
    sidebarEl.innerHTML="";
    state.bookmarks.forEach(function(b){
      var btn=document.createElement("button");
      btn.className="bm";
      var img=document.createElement("img");
      img.src=faviconFor(b.url);
      img.onerror=function(){this.remove();btn.textContent=b.title.charAt(0);};      btn.appendChild(img);
      btn.title=b.title;
      btn.onclick=function(){navigate(b.url);};
      sidebarEl.appendChild(btn);
    });
    var add=document.createElement("button");
    add.className="bm bm-add";
    add.textContent="+";
    add.onclick=function(){var tab=findTab(state.activeId);if(!tab||!tab.url)return;if(state.bookmarks.some(function(b){return b.url===tab.url;}))return;state.bookmarks.push({title:tab.title||hostname(tab.url)||tab.url,url:tab.url});persistState();renderSidebar();};
    sidebarEl.appendChild(add);

    // settings button at bottom-left
    var settings=document.createElement("button");
    settings.className="bm bm-settings";
    settings.title = 'Settings';
    settings.textContent = '⚙';
    settings.onclick = function(){toggleSettings(true)};
    sidebarEl.appendChild(settings);
  }

  function persistState(){
    try{localStorage.setItem('bb_bookmarks',JSON.stringify(state.bookmarks));localStorage.setItem('bb_engine',state.engine);localStorage.setItem('bb_adblock',state.adblock?'true':'false');}catch(e){}
  }

  addressEl.addEventListener("keydown",function(e){if(e.key==="Enter")navigate(addressEl.value);});
  $("btnBack").onclick=goBack;
  $("btnFwd").onclick=goForward;
  $("btnReload").onclick=reload;
  $("addTab").onclick=function(){createTab(null);addressEl.focus();};
  $("fallbackClose").onclick=function(){fallbackEl.classList.remove("show");};
  $("btnStar").onclick=function(){var tab=findTab(state.activeId);if(!tab||!tab.url)return;if(state.bookmarks.some(function(b){return b.url===tab.url;})){state.bookmarks=state.bookmarks.filter(function(b){return b.url!==tab.url});}else{state.bookmarks.push({title:tab.title||hostname(tab.url)||tab.url,url:tab.url});}persistState();renderSidebar();};
  
  $("tlClose").onclick=function(){if(window.electronAPI){window.electronAPI.closeWindow();}else{window.close();}};
  $("tlMin").onclick=function(){if(window.electronAPI){window.electronAPI.minimizeWindow();}};
  $("tlMax").onclick=function(){if(window.electronAPI){window.electronAPI.toggleMaximizeWindow();}};

  var accountBtn=$("btnAccount");
  function refreshAccountUI(){
    if(state.loggedIn){accountBtn.textContent = state.user || 'Account';}
    else {accountBtn.textContent = 'Login';}
  }
  accountBtn.onclick=function(){
    if(state.loggedIn){alert('Signed in as '+state.user);}else{
      var name = prompt('Sign in - enter a display name (mock)');
      if(name){state.loggedIn=true;state.user=name;localStorage.setItem('bb_user',name);refreshAccountUI();}
    }
  };

  // settings modal behavior
  function toggleSettings(show){
    var el=$("settingsModal");
    if(show){el.style.display='block';$("settings").style.display='block';$("adblockToggle").checked = state.adblock;$("engineSelect").value=state.engine;}else{el.style.display='none';$("settings").style.display='none';}
  }
  $("settingsClose").onclick=function(){toggleSettings(false)};
  $("adblockToggle").onchange=function(e){state.adblock = e.target.checked;persistState();if(window.electronAPI && window.electronAPI.setAdblock)window.electronAPI.setAdblock(state.adblock);};
  $("themeToggle").onclick=function(){var root=document.documentElement;root.classList.toggle('light');localStorage.setItem('bb_theme',root.classList.contains('light')?'light':'dark');};
  $("engineSelect").onchange=function(e){state.engine=e.target.value;persistState();};
  $("checkUpdates").onclick=function(){if(window.electronAPI && window.electronAPI.checkForUpdates)window.electronAPI.checkForUpdates();else alert('Auto-update not available in this build.');};

  // populate engine select
  var sel=$("engineSelect");ENGINE_ORDER.forEach(function(k){var opt=document.createElement('option');opt.value=k;opt.textContent=ENGINES[k].name;sel.appendChild(opt);});

  // initialize
  (function init(){
    // apply theme
    var theme = localStorage.getItem('bb_theme');
    if(theme==='light')document.documentElement.classList.add('light');

    // initialize engine button label
    var e=ENGINES[state.engine];$("btnAccount").textContent = state.loggedIn ? (state.user||'Account') : 'Login';

    // create a starter tab
    createTab(null);
    renderSidebar();
    renderTabs();

    // inform main process about adblock preference
    if(window.electronAPI && window.electronAPI.setAdblock)window.electronAPI.setAdblock(state.adblock);
  })();

  // expose some globals for debugging
  window.__bb_state = state;
})();
</script>
</body>
</html>
