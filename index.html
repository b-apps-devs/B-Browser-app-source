<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B-Browser</title>
<link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJ8AAADMCAYAAABtAXG5AAAT/klEQVR4nO2deWyc5ZnAf++M7XHimNwhd0JzkkMJN0rDUcrVUpaWchVV2kVdFmW1wGq1f1VCq62W3VVYKi3qqkF[...]
<style>
  :root{
    --frame:#0d0e10;
    --titlebar:#17181c;
    --toolbar:#1d1f24;
    --sidebar:#17181c;
    --line:#2a2c32;
    --ink:#e9eaec;
    --muted:#8b8f97;
    --accent:#35e0d0;
    --accent-dim:#1f8f86;
    --content-bg:#ffffff;
    --red:#ff5f57;
    --amber:#febc2e;
    --green:#28c840;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:#000;
    font-family:'Segoe UI',ui-sans-serif,system-ui,-apple-system,Helvetica,Arial,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }
  #app{
    width:100vw;
    height:100vh;
    padding:14px;
    display:flex;
  }
  #shell{
    flex:1;
    display:flex;
    flex-direction:column;
    background:var(--frame);
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.6);
    position:relative;
    border:1px solid #050505;
  }

  /* ---------- Title bar ---------- */
  .titlebar{
    display:flex;
    align-items:center;
    gap:14px;
    padding:10px 14px;
    background:var(--titlebar);
    border-bottom:1px solid var(--line);
  }
  .traffic{display:flex;gap:8px;flex:0 0 auto;}
  .traffic button{
    width:13px;height:13px;border-radius:50%;border:none;cursor:pointer;padding:0;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,.15);
    transition:transform 0.15s ease;
  }
  .traffic .close{background:var(--red);}
  .traffic .minimize{background:var(--amber);}
  .traffic .maximize{background:var(--green);}
  .traffic button:hover{filter:brightness(1.15);transform:scale(1.1);}

  .tabs{
    flex:1;
    display:flex;
    align-items:flex-end;
    gap:6px;
    overflow-x:auto;
    scrollbar-width:none;
    padding:4px 4px 0 4px;
    border-radius:14px 14px 0 0;
  }
  .tabs::-webkit-scrollbar{display:none;}
  .tab{
    display:flex;
    align-items:center;
    gap:8px;
    padding:7px 10px;
    max-width:170px;
    min-width:110px;
    background:#101115;
    color:var(--muted);
    border-radius:10px 10px 0 0;
    font-size:12.5px;
    cursor:pointer;
    white-space:nowrap;
    position:relative;
    flex:0 0 auto;
    border:1px solid #2a2c32;
    border-bottom:none;
  }
  .tab.active{
    background:var(--content-bg);
    color:#1c1d1f;
    border-color:#1c1d1f;
  }
  .tab img.favicon{width:14px;height:14px;border-radius:3px;flex:0 0 auto;}
  .tab .t-title{overflow:hidden;text-overflow:ellipsis;flex:1;}
  .tab .t-close{
    opacity:0;flex:0 0 auto;width:16px;height:16px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;
    color:inherit;
  }
  .tab:hover .t-close{opacity:.7;}
  .tab .t-close:hover{opacity:1;background:rgba(128,128,128,.25);}
  .tab-add{
    flex:0 0 auto;width:26px;height:26px;border-radius:8px;border:none;
    background:transparent;color:var(--muted);font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;margin-bottom:4px;
  }
  .tab-add:hover{background:#232530;color:var(--ink);}

  .brand{
    flex:0 0 auto;
    display:flex;align-items:center;
    background:#f2f2f3;
    border-radius:999px;
    padding:5px 14px;
    margin-left:4px;
  }
  .brand img{height:14px;width:auto;display:block;}

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:9px 14px;
    background:var(--toolbar);
    border-bottom:1px solid var(--line);
  }
  .nav-btn{
    width:30px;height:30px;border-radius:50%;border:none;background:#26282f;
    color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-size:14px;flex:0 0 auto;
  }
  .nav-btn:hover:not(:disabled){background:#31333c;color:var(--ink);}
  .nav-btn:disabled{opacity:.35;cursor:default;}

  .address-wrap{
    flex:1;
    display:flex;
    align-items:center;
    gap:8px;
    background:#26282f;
    border-radius:999px;
    padding:0 8px 0 14px;
    height:32px;
    min-width:0;
  }
  .address-wrap svg{flex:0 0 auto;opacity:.6;}
  #address{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:var(--ink);
    font-size:13px;
    min-width:0;
  }
  #address::placeholder{color:var(--muted);}
  .star-btn{
    flex:0 0 auto;width:24px;height:24px;border:none;background:transparent;
    color:var(--muted);cursor:pointer;font-size:15px;border-radius:6px;
  }
  .star-btn.active{color:var(--accent);}
  .star-btn:hover{background:rgba(255,255,255,.08);}

  .ext-btn{
    flex:0 0 auto;height:32px;padding:0 14px;border-radius:999px;border:none;
    background:#26282f;color:var(--muted);font-size:12px;cursor:pointer;
  }
  .ext-btn:hover{background:#31333c;color:var(--ink);}

  /* ---------- Body ---------- */
  .body{flex:1;display:flex;min-height:0;}
  .sidebar{
    width:60px;
    background:var(--sidebar);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:12px 0;
    gap:10px;
    overflow-y:auto;
  }
  .bm{
    width:38px;height:38px;border-radius:50%;background:#26282f;border:none;
    cursor:pointer;display:flex;align-items:center;justify-content:center;overflow:hidden;
    flex:0 0 auto;color:var(--muted);font-size:15px;
  }
  .bm:hover{background:#31333c;}
  .bm img{width:100%;height:100%;object-fit:cover;}
  .bm-add{
    margin-top:auto;border:1.5px dashed #3a3c44;background:transparent;color:var(--muted);
  }
  .bm-add:hover{border-color:var(--accent);color:var(--accent);}

  .content{flex:1;position:relative;background:#f4f4f5;}
  .content iframe{
    position:absolute;inset:0;width:100%;height:100%;border:none;background:#fff;display:none;
  }
  .content iframe.active{display:block;}

  .newtab{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:linear-gradient(180deg,#fafafa,#f1f1f2);
  }
  .newtab.active{display:flex;}
  .newtab .nb-mark{
    width:56px;height:auto;
  }
  .newtab p{color:#8a8d93;font-size:13.5px;margin:0;}

  .fallback{
    position:absolute;bottom:14px;right:14px;background:#1d1f24;color:var(--ink);
    padding:9px 13px;border-radius:10px;font-size:12px;display:none;align-items:center;gap:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.35);z-index:5;
  }
  .fallback.show{display:flex;}
  .fallback a{color:var(--accent);text-decoration:none;font-weight:600;}
  .fallback button{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;}

  /* ---------- Setup overlay ---------- */
  #setup{
    position:absolute;inset:0;background:var(--frame);
    display:flex;flex-direction:column;z-index:20;
  }
  .su-titlebar{
    display:flex;align-items:center;gap:14px;padding:10px 14px;
    background:var(--titlebar);border-bottom:1px solid var(--line);
  }
  .su-body{
    flex:1;display:flex;align-items:center;justify-content:center;padding:30px;
    background:#e9e9ea;
  }
  .su-screen{display:none;width:100%;max-width:520px;text-align:center;animation:fade .35s ease;}
  .su-screen.active{display:block;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .su-screen h1{font-size:clamp(26px,5vw,42px);margin:0 0 28px;color:#1a1a1a;letter-spacing:-.5px;}
  .su-eyebrow{font-size:14px;color:#8a8d93;letter-spacing:2px;text-transform:uppercase;margin:0 0 10px;font-weight:700;}
  .su-logo{width:min(340px,70vw);height:auto;margin:0 0 34px;}
  .su-btn{
    background:#111214;color:#fff;border:none;border-radius:999px;
    padding:16px 44px;font-size:18px;font-weight:700;cursor:pointer;
  }
  .su-btn:hover{background:#000;}
  .engine-list{display:flex;flex-direction:column;gap:10px;text-align:left;max-width:400px;margin:0 auto;}
  .engine-row{
    display:flex;align-items:center;gap:10px;background:#fff;border-radius:999px;
    padding:10px 16px;cursor:pointer;border:2px solid transparent;
  }
  .engine-row:hover{border-color:#d5d5d7;}
  .engine-row.selected{border-color:var(--accent-dim);}
  .engine-row .e-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:14px;border-radius:5px;flex:0 0 auto;}
  .engine-row span.label{flex:1;font-size:14.5px;color:#1a1a1a;}
  .radio{width:20px;height:20px;border-radius:50%;border:2px solid #b9b9bc;flex:0 0 auto;position:relative;}
  .engine-row.selected .radio{border-color:var(--accent-dim);}
  .engine-row.selected .radio::after{
    content:"";position:absolute;inset:3px;border-radius:50%;background:var(--accent-dim);
  }
  .account-stack{display:flex;flex-direction:column;gap:12px;max-width:420px;margin:0 auto;}
  .account-btn{
    padding:16px;border-radius:12px;border:2px solid #1a1a1a;background:transparent;
    font-size:17px;font-weight:700;color:#1a1a1a;cursor:pointer;
  }
  .account-btn:hover{background:#1a1a1a;color:#fff;}
  .account-form{max-width:340px;margin:14px auto 0;display:flex;flex-direction:column;gap:10px;text-align:left;}
  .account-form input{
    padding:11px 13px;border-radius:8px;border:1px solid #cfcfd2;font-size:13.5px;outline:none;
  }
  .account-form input:focus{border-color:var(--accent-dim);}
  .account-form small{color:#8a8d93;}
  .account-form button{margin-top:4px;}

  /* ---------- Install tab ---------- */
  .install-screen{
    position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;z-index:10;
  }
  .install-screen.active{display:flex;}
  .install-screen h2{font-size:32px;margin:0;font-weight:700;}
  .install-screen p{font-size:16px;margin:0;opacity:.9;max-width:400px;}
  .install-loading{
    display:flex;align-items:center;gap:10px;font-size:14px;
  }
  .spinner{
    display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,.3);
    border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  @media (max-width:640px){
    .sidebar{width:46px;}
    .bm{width:32px;height:32px;}
    .brand{display:none;}
    .ext-btn{display:none;}
  }
</style>
</head>
<body>
<div id="app"><div id="shell">

  <!-- ===================== INSTALL CHECK ===================== -->
  <div class="install-screen" id="installScreen">
    <h2>Checking Connection...</h2>
    <div class="install-loading">
      <span class="spinner"></span>
      <span>Verifying internet access</span>
    </div>
    <p id="installMessage" style="font-size:12px;margin-top:10px;opacity:0.7;"></p>
  </div>

  <!-- ===================== SETUP WIZARD ===================== -->
  <div id="setup">
    <div class="su-titlebar">
      <div class="traffic">
        <button class="close"></button><button class="minimize"></button><button class="maximize"></button>
      </div>
    </div>
    <div class="su-body">

      <div class="su-screen active" data-screen="1">
        <p class="su-eyebrow">Welcome to</p>
        <img class="su-logo" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABdwAAAH0CAYAAAAnhe8sAADEHUlEQVR4nOzdd5gkZbn+8W/PzO5sms05w7LkHAQRJIMIqIA5Y0Y95p/HhDkd0zl6PIr5GEkKiCIZkZwkIxmWXcImNued[...]
        <div><button class="su-btn" id="btnStart">Setup</button></div>
      </div>

      <div class="su-screen" data-screen="2">
        <h1>Choose your search engine</h1>
        <div class="engine-list" id="engineList"></div>
      </div>

      <div class="su-screen" data-screen="3">
        <h1>Login/Register to your B-account</h1>
        <div class="account-stack" id="accountStack">
          <button class="account-btn" data-mode="register">Register</button>
          <button class="account-btn" data-mode="login">Login</button>
          <button class="account-btn" id="btnSkip">Skip</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ===================== BROWSER ===================== -->
  <div class="titlebar">
    <div class="traffic">
      <button class="close" id="tlClose" title="Close tab"></button>
      <button class="minimize" id="tlMin" title="Minimize"></button>
      <button class="maximize" id="tlMax" title="Maximize"></button>
    </div>
    <div class="tabs" id="tabs"></div>
    <button class="tab-add" id="addTab" title="New tab">+</button>
    <div class="brand"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABdwAAAH0CAYAAAAnhe8sAADEHUlEQVR4nOzdd5gkZbn+8W/PzM5sms05w7LkHAQRJIMIqIA5Y0Y95p/HhDkd0zl6PIr5GEkKiCIZkZwkIxmWXcImNued[...]
  </div>

  <div class="toolbar">
    <button class="nav-btn" id="btnBack" title="Back">‹</button>
    <button class="nav-btn" id="btnFwd" title="Forward">›</button>
    <button class="nav-btn" id="btnReload" title="Reload">⟳</button>
    <div class="address-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input id="address" placeholder="Search or enter url" autocomplete="off" spellcheck="false"/>
      <button class="star-btn" id="btnStar" title="Bookmark this page">★</button>
    </div>
    <button class="ext-btn" id="btnEngine">engine: Google</button>
  </div>

  <div class="body">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div class="fallback" id="fallback">
        <span>Site may refuse to load in-page.</span>
        <a id="fallbackLink" href="#" target="_blank" rel="noopener">Open directly ↗</a>
        <button id="fallbackClose">✕</button>
      </div>
    </div>
  </div>

</div></div>

<script>
(function(){
  "use strict";

  /* ============ INTERNET CHECK (runs on startup) ============ */
  var isOnline = false;
  function checkInternet() {
    return new Promise(function(resolve) {
      Promise.race([
        fetch('https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png', { mode: 'no-cors' }),
        new Promise(function(_, reject) { setTimeout(function() { reject(new Error('timeout')); }, 3000); })
      ])
      .then(function() {
        isOnline = true;
        resolve(true);
      })
      .catch(function() {
        isOnline = false;
        resolve(false);
      });
    });
  }

  /* ============ SEARCH ENGINES (fixed: prevent undefined) ============ */
  var ENGINES = {
    google:     {name:"Google",     color:"#fff", icon:"G",  fg:"#4285F4", url:function(q){return "https://www.google.com/search?q="+encodeURIComponent(q);}},
    duckduckgo: {name:"DuckDuckGo", color:"#DE5833", icon:"D", fg:"#fff",  url:function(q){return "https://duckduckgo.com/?q="+encodeURIComponent(q);}},
    bing:       {name:"Bing",       color:"#008373", icon:"b", fg:"#fff", url:function(q){return "https://www.bing.com/search?q="+encodeURIComponent(q);}},
    yahoo:      {name:"Yahoo!",     color:"#6001D2", icon:"!", fg:"#fff", url:function(q){return "https://search.yahoo.com/search?p="+encodeURIComponent(q);}},
    amazon:     {name:"Amazon",     color:"#111",    icon:"a", fg:"#FF9900", url:function(q){return "https://www.amazon.com/s?k="+encodeURIComponent(q);}},
    wikipedia:  {name:"Wikipedia",  color:"#fff",    icon:"W", fg:"#111",  url:function(q){return "https://en.wikipedia.org/wiki/Special:Search?search="+encodeURIComponent(q);}}
  };
  var ENGINE_ORDER = ["google","duckduckgo","bing","yahoo","amazon","wikipedia"];

  var state = {
    engine: "google",
    tabs: [],
    activeId: null,
    nextId: 1,
    bookmarks: [
      {title:"Wikipedia", url:"https://en.wikipedia.org"},
      {title:"Hacker News", url:"https://news.ycombinator.com"},
      {title:"Internet Archive", url:"https://archive.org"},
      {title:"Example", url:"https://example.com"}
    ]
  };

  /* ============ DOM REFS ============ */
  var $ = function(id){ return document.getElementById(id); };
  var tabsEl = $("tabs"), contentEl = $("content"), sidebarEl = $("sidebar");
  var addressEl = $("address"), fallbackEl = $("fallback"), fallbackLink = $("fallbackLink");
  var installScreen = $("installScreen"), installMessage = $("installMessage");

  function hostname(u){
    try { return new URL(u).hostname; } catch(e){ return ""; }
  }
  function faviconFor(u){
    var h = hostname(u);
    return h ? "https://www.google.com/s2/favicons?sz=64&domain=" + h : "";
  }
  function looksLikeUrl(input){
    var s = input.trim();
    if (/^https?:\/\//i.test(s)) return true;
    if (/^[a-z0-9-]+(\.[a-z0-9-]+)+(:\d+)?(\/\S*)?$/i.test(s) && !s.includes(" ")) return true;
    return false;
  }
  function normalizeUrl(input){
    var s = input.trim();
    if (/^https?:\/\//i.test(s)) return s;
    return "https://" + s;
  }
  function resolveInput(input){
    var s = input.trim();
    if (!s) return null;
    if (looksLikeUrl(s)) return normalizeUrl(s);
    var engine = ENGINES[state.engine];
    return engine && engine.url ? engine.url(s) : "https://www.google.com/search?q="+encodeURIComponent(s);
  }

  /* ============ TABS ============ */
  function newTabObj(url){
    var id = state.nextId++;
    return { id:id, url:url||"" , title: url ? hostname(url) : "New tab", history:[], histIndex:-1, starred:false, iframe:null, node:null };
  }

  function createTab(url){
    var tab = newTabObj(url);
    state.tabs.push(tab);

    var page;
    if (url) {
      page = document.createElement("iframe");
      page.className = "";
      page.setAttribute("referrerpolicy","no-referrer");
      contentEl.appendChild(page);
      tab.iframe = page;
      tab.history.push(url);
      tab.histIndex = 0;
    } else {
      page = document.createElement("div");
      page.className = "newtab";
      page.innerHTML = '<img class="nb-mark" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJ8AAADMCAYAAABtAXG5AAAT/klEQVR4nO2deWyc5ZnAf++M7XHimNwhd0JzkkMJN0rDUcrVUpaWchVV2kVdFmW1wGq1f1VCq62[...]'
        + '<p>Start typing to search</p>';
      contentEl.appendChild(page);
      tab.iframe = null;
      tab.node = page;
    }
    tab.pageEl = page;

    switchTab(tab.id);
    return tab;
  }

  function findTab(id){
    for (var i=0;i<state.tabs.length;i++) if (state.tabs[i].id===id) return state.tabs[i];
    return null;
  }

  function switchTab(id){
    state.activeId = id;
    state.tabs.forEach(function(t){
      t.pageEl.classList.toggle("active", t.id===id);
    });
    renderTabs();
    var tab = findTab(id);
    if (tab) {
      addressEl.value = tab.url || "";
      $("btnStar").classList.toggle("active", !!tab.starred);
    }
    updateNavButtons();
    fallbackEl.classList.remove("show");
  }

  function closeTab(id){
    var idx = state.tabs.findIndex(function(t){return t.id===id;});
    if (idx===-1) return;
    var tab = state.tabs[idx];
    tab.pageEl.remove();
    state.tabs.splice(idx,1);

    if (state.tabs.length===0){
      createTab(null);
      return;
    }
    if (state.activeId===id){
      var next = state.tabs[Math.max(0, idx-1)];
      switchTab(next.id);
    } else {
      renderTabs();
    }
  }

  function renderTabs(){
    tabsEl.innerHTML = "";
    state.tabs.forEach(function(t){
      var el = document.createElement("div");
      el.className = "tab" + (t.id===state.activeId ? " active" : "");
      var fav = document.createElement("img");
      fav.className = "favicon";
      fav.src = t.url ? faviconFor(t.url) : "";
      fav.onerror = function(){ this.style.visibility="hidden"; };
      if(!t.url) fav.style.visibility="hidden";
      var title = document.createElement("span");
      title.className = "t-title";
      title.textContent = t.title || "New tab";
      var close = document.createElement("span");
      close.className = "t-close";
      close.textContent = "✕";
      close.onclick = function(e){ e.stopPropagation(); closeTab(t.id); };
      el.appendChild(fav); el.appendChild(title); el.appendChild(close);
      el.onclick = function(){ switchTab(t.id); };
      tabsEl.appendChild(el);
    });
  }

  /* ============ NAVIGATION ============ */
  function navigate(input, pushHistory){
    var url = resolveInput(input);
    if (!url) return;
    var tab = findTab(state.activeId);
    if (!tab) return;

    if (tab.node && !tab.iframe){
      // convert new-tab placeholder into a real iframe
      var page = document.createElement("iframe");
      page.setAttribute("referrerpolicy","no-referrer");
      contentEl.appendChild(page);
      tab.pageEl.remove();
      tab.pageEl = page;
      tab.iframe = page;
      tab.node = null;
      page.classList.add("active");
    }

    if (pushHistory !== false){
      tab.history = tab.history.slice(0, tab.histIndex+1);
      tab.history.push(url);
      tab.histIndex = tab.history.length-1;
    }

    tab.url = url;
    tab.title = hostname(url) || url;
    if (tab.iframe) tab.iframe.src = url;
    addressEl.value = url;
    renderTabs();
    updateNavButtons();
    tab.starred = state.bookmarks.some(function(b){return b.url===url;});
    $("btnStar").classList.toggle("active", tab.starred);

    showFallback(url);
  }

  function showFallback(url){
    fallbackLink.href = url;
    fallbackLink.onclick = function(e){
      if (window.electronAPI) { e.preventDefault(); window.electronAPI.openExternal(url); }
    };
    fallbackEl.classList.add("show");
    clearTimeout(showFallback._t);
    showFallback._t = setTimeout(function(){ fallbackEl.classList.remove("show"); }, 6000);
  }

  function updateNavButtons(){
    var tab = findTab(state.activeId);
    $("btnBack").disabled = !tab || tab.histIndex<=0;
    $("btnFwd").disabled = !tab || tab.histIndex>=tab.history.length-1;
  }

  function goBack(){
    var tab = findTab(state.activeId);
    if (!tab || tab.histIndex<=0) return;
    tab.histIndex--;
    var url = tab.history[tab.histIndex];
    tab.url = url; tab.title = hostname(url);
    if (tab.iframe) tab.iframe.src = url;
    addressEl.value = url;
    renderTabs(); updateNavButtons();
  }
  function goForward(){
    var tab = findTab(state.activeId);
    if (!tab || tab.histIndex>=tab.history.length-1) return;
    tab.histIndex++;
    var url = tab.history[tab.histIndex];
    tab.url = url; tab.title = hostname(url);
    if (tab.iframe) tab.iframe.src = url;
    addressEl.value = url;
    renderTabs(); updateNavButtons();
  }
  function reload(){
    var tab = findTab(state.activeId);
    if (!tab || !tab.iframe) return;
    tab.iframe.src = tab.iframe.src;
  }

  /* ============ BOOKMARKS / SIDEBAR ============ */
  function renderSidebar(){
    sidebarEl.innerHTML = "";
    state.bookmarks.forEach(function(b){
      var btn = document.createElement("button");
      btn.className = "bm";
      var img = document.createElement("img");
      img.src = faviconFor(b.url);
      img.onerror = function(){ this.remove(); btn.textContent = b.title.charAt(0).toUpperCase(); };
      btn.appendChild(img);
      btn.title = b.title;
      btn.onclick = function(){ addressEl.value = b.url; navigate(b.url); };
      sidebarEl.appendChild(btn);
    });
    var add = document.createElement("button");
    add.className = "bm bm-add";
    add.textContent = "+";
    add.title = "Bookmark current page";
    add.onclick = addBookmarkFromCurrent;
    sidebarEl.appendChild(add);
  }

  function addBookmarkFromCurrent(){
    var tab = findTab(state.activeId);
    if (!tab || !tab.url) return;
    if (state.bookmarks.some(function(b){return b.url===tab.url;})) return;
    state.bookmarks.push({title: tab.title || hostname(tab.url), url: tab.url});
    tab.starred = true;
    $("btnStar").classList.add("active");
    renderSidebar();
  }

  $("btnStar").onclick = addBookmarkFromCurrent;

  /* ============ TOOLBAR WIRING ============ */
  addressEl.addEventListener("keydown", function(e){
    if (e.key === "Enter") navigate(addressEl.value);
  });
  $("btnBack").onclick = goBack;
  $("btnFwd").onclick = goForward;
  $("btnReload").onclick = reload;
  $("addTab").onclick = function(){ createTab(null); addressEl.focus(); };
  $("fallbackClose").onclick = function(){ fallbackEl.classList.remove("show"); };

  $("tlClose").onclick = function(){
    if (window.electronAPI) { window.electronAPI.closeWindow(); return; }
    closeTab(state.activeId);
  };
  $("tlMin").onclick = function(){
    if (window.electronAPI) { window.electronAPI.minimizeWindow(); return; }
  };
  $("tlMax").onclick = function(){
    if (window.electronAPI) { window.electronAPI.toggleMaximizeWindow(); return; }
  };

  var engineBtn = $("btnEngine");
  engineBtn.onclick = function(){
    var idx = ENGINE_ORDER.indexOf(state.engine);
    state.engine = ENGINE_ORDER[(idx+1) % ENGINE_ORDER.length];
    var nextEngine = ENGINES[state.engine];
    engineBtn.textContent = "engine: " + (nextEngine ? nextEngine.name : "Google");
  };

  /* ============ SETUP WIZARD ============ */
  var screens = document.querySelectorAll(".su-screen");
  function showScreen(n){
    screens.forEach(function(s){ s.classList.toggle("active", s.dataset.screen==String(n)); });
  }
  $("btnStart").onclick = function(){ showScreen(2); };

  var engineListEl = $("engineList");
  ENGINE_ORDER.forEach(function(key){
    var e = ENGINES[key];
    if (!e) return;
    var row = document.createElement("div");
    row.className = "engine-row";
    row.innerHTML =
      '<span class="e-icon" style="background:'+e.color+';color:'+e.fg+'">'+e.icon+'</span>'+
      '<span class="label">'+e.name+'</span>'+
      '<span class="radio"></span>';
    row.onclick = function(){
      document.querySelectorAll(".engine-row").forEach(function(r){r.classList.remove("selected");});
      row.classList.add("selected");
      state.engine = key;
      engineBtn.textContent = "engine: " + e.name;
      setTimeout(function(){ showScreen(3); }, 280);
    };
    engineListEl.appendChild(row);
  });

  $("btnSkip").onclick = finishSetup;
  document.querySelectorAll(".account-btn[data-mode]").forEach(function(btn){
    btn.addEventListener("click", function(){
      var mode = btn.dataset.mode;
      var stack = $("accountStack");
      if (stack.querySelector(".account-form")) return;
      var form = document.createElement("div");
      form.className = "account-form";
      form.innerHTML =
        '<input type="email" placeholder="Email" />'+
        '<input type="password" placeholder="Password" />'+
        '<small>Demo only — no account is actually created.</small>'+
        '<button class="account-btn">'+(mode==="register"?"Create account":"Sign in")+'</button>';
      form.querySelector("button").onclick = finishSetup;
      stack.appendChild(form);
    });
  });

  function finishSetup(){
    $("setup").style.display = "none";
    installScreen.classList.add("active");
    checkInternet().then(function(online){
      if (!online) {
        installMessage.textContent = "⚠️ No internet connection. Some features will be limited.";
        setTimeout(function() {
          installScreen.classList.remove("active");
          createTab(null);
          renderSidebar();
          addressEl.focus();
        }, 2500);
      } else {
        installMessage.textContent = "✓ Connected";
        setTimeout(function() {
          installScreen.classList.remove("active");
          createTab(null);
          renderSidebar();
          addressEl.focus();
        }, 1500);
      }
    });
  }

  /* BOOT */
  updateNavButtons();
})();
</script>
</body>
</html>
