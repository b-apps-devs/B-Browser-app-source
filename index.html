<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B-Browser</title>
    <!-- Favicon from asset folder -->
    <link rel="icon" type="image/png" href="asset/icon.png" />
    <link rel="icon" type="image/x-icon" href="asset/icon.ico" />
    <style>
        /* ─── Reset & Root ─── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        :root {
            --frame: #0d0e10;
            --titlebar: #17181c;
            --toolbar: #1d1f24;
            --sidebar: #17181c;
            --line: #2a2c32;
            --ink: #e9eaec;
            --muted: #8b8f97;
            --accent: #35e0d0;
            --accent-dim: #1f8f86;
            --content-bg: #ffffff;
            --red: #ff5f57;
            --amber: #febc2e;
            --green: #28c840;
            --radius: 14px;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        html,
        body {
            height: 100%;
            margin: 0;
        }
        body {
            background: #000;
            font-family: var(--font);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #app {
            width: 100vw;
            height: 100vh;
            display: flex;
        }
        #shell {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--frame);
            overflow: hidden;
            position: relative;
            border: none;
        }

        /* ─── Title Bar ─── */
        .titlebar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            background: var(--titlebar);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }
        .traffic {
            display: flex;
            gap: 8px;
            flex: 0 0 auto;
        }
        .traffic button {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            padding: 0;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .15);
            transition: filter .15s;
        }
        .traffic .r {
            background: var(--red);
        }
        .traffic .y {
            background: var(--amber);
        }
        .traffic .g {
            background: var(--green);
        }
        .traffic button:hover {
            filter: brightness(1.2);
        }

        .tabs {
            flex: 1;
            display: flex;
            align-items: flex-end;
            gap: 6px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-left: 4px;
        }
        .tabs::-webkit-scrollbar {
            display: none;
        }
        .tab {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            max-width: 170px;
            min-width: 110px;
            background: #101115;
            color: var(--muted);
            border-radius: 10px;
            font-size: 12.5px;
            cursor: pointer;
            white-space: nowrap;
            flex: 0 0 auto;
            transition: background .15s;
        }
        .tab.active {
            background: var(--content-bg);
            color: #1c1d1f;
        }
        .tab img.favicon {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            flex: 0 0 auto;
        }
        .tab .t-title {
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .tab .t-close {
            opacity: 0;
            flex: 0 0 auto;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: none;
            background: transparent;
            color: inherit;
            cursor: pointer;
            transition: opacity .15s, background .15s;
        }
        .tab:hover .t-close {
            opacity: .7;
        }
        .tab .t-close:hover {
            opacity: 1;
            background: rgba(128, 128, 128, .25);
        }
        .tab-add {
            flex: 0 0 auto;
            width: 26px;
            height: 26px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: var(--muted);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 4px;
            transition: background .15s, color .15s;
        }
        .tab-add:hover {
            background: #232530;
            color: var(--ink);
        }
        .brand {
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            background: #f2f2f3;
            border-radius: 999px;
            padding: 5px 14px;
            margin-left: 4px;
        }
        .brand img {
            height: 18px;
            width: auto;
            display: block;
        }

        /* ─── Toolbar ─── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            background: var(--toolbar);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }
        .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: none;
            background: #26282f;
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex: 0 0 auto;
            transition: background .15s, color .15s;
        }
        .nav-btn:hover:not(:disabled) {
            background: #31333c;
            color: var(--ink);
        }
        .nav-btn:disabled {
            opacity: .35;
            cursor: default;
        }
        .address-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #26282f;
            border-radius: 999px;
            padding: 0 8px 0 14px;
            height: 32px;
            min-width: 0;
        }
        .address-wrap svg {
            flex: 0 0 auto;
            opacity: .6;
        }
        #address {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--ink);
            font-size: 13px;
            min-width: 0;
        }
        #address::placeholder {
            color: var(--muted);
        }
        .star-btn {
            flex: 0 0 auto;
            width: 24px;
            height: 24px;
            border: none;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            font-size: 15px;
            border-radius: 6px;
            transition: color .15s, background .15s;
        }
        .star-btn.active {
            color: var(--accent);
        }
        .star-btn:hover {
            background: rgba(255, 255, 255, .08);
        }
        .ext-btn {
            flex: 0 0 auto;
            height: 32px;
            padding: 0 14px;
            border-radius: 999px;
            border: none;
            background: #26282f;
            color: var(--muted);
            font-size: 12px;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .ext-btn:hover {
            background: #31333c;
            color: var(--ink);
        }

        /* ─── Body ─── */
        .body {
            flex: 1;
            display: flex;
            min-height: 0;
        }
        .sidebar {
            width: 60px;
            background: var(--sidebar);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            flex: 0 0 auto;
        }
        .sidebar-scroll {
            flex: 1;
            width: 100%;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .sidebar-scroll::-webkit-scrollbar {
            display: none;
        }
        .bm {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #26282f;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex: 0 0 auto;
            color: var(--muted);
            font-size: 15px;
            transition: background .15s;
        }
        .bm:hover {
            background: #31333c;
        }
        .bm img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .bm-add {
            border: 1.5px dashed #3a3c44;
            background: transparent;
            color: var(--muted);
        }
        .bm-add:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        .settings-btn {
            margin-top: 10px;
            flex: 0 0 auto;
            font-size: 17px;
            transition: background .15s, color .15s;
        }
        .settings-btn.active {
            background: #31333c;
            color: var(--accent);
        }

        /* ─── Content ─── */
        .content {
            flex: 1;
            position: relative;
            background: #f4f4f5;
        }
        .content iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            display: none;
        }
        .content iframe.active {
            display: block;
        }
        .newtab {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(180deg, #fafafa, #f1f1f2);
            padding: 20px;
        }
        .newtab.active {
            display: flex;
        }
        .newtab .nb-logo {
            max-width: 200px;
            height: auto;
        }
        .newtab .search-container {
            display: flex;
            align-items: center;
            background: #fff;
            border-radius: 999px;
            padding: 0 16px;
            width: min(80%, 500px);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transition: box-shadow 0.2s;
        }
        .newtab .search-container:focus-within {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
        }
        .newtab #newtab-search {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 8px;
            font-size: 16px;
            background: transparent;
            color: #1a1a1a;
        }
        .newtab #newtab-search::placeholder {
            color: #aaa;
        }
        .newtab .search-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 8px 4px 8px 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #555;
            transition: color 0.2s;
        }
        .newtab .search-btn:hover {
            color: #000;
        }
        .newtab .search-btn svg {
            display: block;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
        }

        .fallback {
            position: absolute;
            bottom: 14px;
            right: 14px;
            background: #1d1f24;
            color: var(--ink);
            padding: 9px 13px;
            border-radius: 10px;
            font-size: 12px;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .35);
            z-index: 5;
        }
        .fallback.show {
            display: flex;
        }
        .fallback a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .fallback button {
            background: transparent;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 14px;
        }

        /* ─── Account Dropdown ─── */
        .acct-dropdown {
            position: absolute;
            top: 52px;
            right: 14px;
            width: 240px;
            background: #1d1f24;
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, .45);
            display: none;
            flex-direction: column;
            gap: 8px;
            z-index: 15;
        }
        .acct-dropdown.show {
            display: flex;
        }
        .acct-dropdown .account-btn {
            padding: 11px;
            border-radius: 10px;
            border: 1.5px solid #3a3c44;
            background: transparent;
            font-size: 13.5px;
            font-weight: 600;
            color: var(--ink);
            cursor: pointer;
            transition: background .15s, border-color .15s;
        }
        .acct-dropdown .account-btn:hover {
            background: #26282f;
            border-color: var(--accent-dim);
        }
        .acct-dropdown .account-form {
            max-width: none;
            margin: 2px 0 0;
            gap: 8px;
            display: flex;
            flex-direction: column;
        }
        .acct-dropdown .account-form input {
            padding: 9px 10px;
            border-radius: 8px;
            border: 1px solid #3a3c44;
            background: #111214;
            color: var(--ink);
            font-size: 12.5px;
            outline: none;
        }
        .acct-dropdown .account-form input:focus {
            border-color: var(--accent-dim);
        }
        .acct-dropdown .account-form small {
            color: var(--muted);
            font-size: 11px;
        }
        .acct-signed-in {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .acct-signed-in .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--accent-dim);
            color: #062622;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex: 0 0 auto;
        }
        .acct-signed-in .info {
            flex: 1;
            min-width: 0;
        }
        .acct-signed-in .info .name {
            font-size: 13px;
            color: var(--ink);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .acct-signed-in .info small {
            color: var(--muted);
        }
        .acct-signout {
            margin-top: 4px;
            padding: 9px;
            border-radius: 8px;
            border: 1.5px solid #3a3c44;
            background: transparent;
            color: var(--muted);
            font-size: 12.5px;
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        .acct-signout:hover {
            border-color: #5a3030;
            color: #ff8f87;
        }

        /* ─── SETUP WIZARD ─── */
        #setup {
            position: absolute;
            inset: 0;
            background: var(--frame);
            display: flex;
            flex-direction: column;
            z-index: 20;
        }
        .su-titlebar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            background: var(--titlebar);
            border-bottom: 1px solid var(--line);
            flex: 0 0 auto;
        }
        .su-body {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: #e9e9ea;
        }
        .su-screen {
            display: none;
            width: 100%;
            max-width: 520px;
            text-align: center;
            animation: fade .35s ease;
        }
        .su-screen.active {
            display: block;
        }
        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }
        .su-screen h1 {
            font-size: clamp(26px, 5vw, 42px);
            margin: 0 0 28px;
            color: #1a1a1a;
            letter-spacing: -.5px;
        }
        .su-eyebrow {
            font-size: 14px;
            color: #8a8d93;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 10px;
            font-weight: 700;
        }
        .su-logo {
            display: inline-block;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 0 34px;
            background: #111214;
        }
        .su-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .su-btn {
            background: #111214;
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 16px 44px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: background .15s;
        }
        .su-btn:hover {
            background: #000;
        }
        .engine-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
            max-width: 400px;
            margin: 0 auto;
        }
        .engine-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border-radius: 999px;
            padding: 10px 16px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .15s;
        }
        .engine-row:hover {
            border-color: #d5d5d7;
        }
        .engine-row.selected {
            border-color: var(--accent-dim);
        }
        .engine-row .e-icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            border-radius: 5px;
            flex: 0 0 auto;
            font-weight: 700;
        }
        .engine-row span.label {
            flex: 1;
            font-size: 14.5px;
            color: #1a1a1a;
        }
        .radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #b9b9bc;
            flex: 0 0 auto;
            position: relative;
            transition: border-color .15s;
        }
        .engine-row.selected .radio {
            border-color: var(--accent-dim);
        }
        .engine-row.selected .radio::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--accent-dim);
        }
        .account-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 420px;
            margin: 0 auto;
        }
        .account-btn {
            padding: 16px;
            border-radius: 12px;
            border: 2px solid #1a1a1a;
            background: transparent;
            font-size: 17px;
            font-weight: 700;
            color: #1a1a1a;
            cursor: pointer;
            transition: background .15s, color .15s;
        }
        .account-btn:hover {
            background: #1a1a1a;
            color: #fff;
        }
        .account-form {
            max-width: 340px;
            margin: 14px auto 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            text-align: left;
        }
        .account-form input {
            padding: 11px 13px;
            border-radius: 8px;
            border: 1px solid #cfcfd2;
            font-size: 13.5px;
            outline: none;
            transition: border-color .15s;
        }
        .account-form input:focus {
            border-color: var(--accent-dim);
        }
        .account-form small {
            color: #8a8d93;
        }
        .account-form button {
            margin-top: 4px;
        }

        /* ─── SETTINGS MODAL (POP-UP) ─── */
        .settings-modal {
            position: fixed;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, .55);
            backdrop-filter: blur(8px);
            z-index: 999999;
            padding: 20px;
        }
        .settings-modal.show {
            display: flex;
        }
        .settings-window {
            width: 920px;
            max-width: 100%;
            height: 650px;
            max-height: 90vh;
            background: #1b1c20;
            border: 1px solid #34363d;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, .45);
            animation: settingsOpen .18s ease;
            display: flex;
            flex-direction: column;
        }
        @keyframes settingsOpen {
            from {
                opacity: 0;
                transform: scale(.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        .settings-titlebar {
            height: 58px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 22px;
            background: #202126;
            border-bottom: 1px solid #31333a;
            flex: 0 0 auto;
        }
        .settings-titlebar span {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }
        .settings-titlebar button {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #fff;
            cursor: pointer;
            font-size: 20px;
            transition: background .15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .settings-titlebar button:hover {
            background: #34353b;
        }
        .settings-body {
            display: flex;
            flex: 1;
            min-height: 0;
        }
        .settings-sidebar {
            width: 220px;
            background: #17181d;
            border-right: 1px solid #2d3037;
            padding: 18px;
            overflow-y: auto;
            flex: 0 0 auto;
        }
        .settings-tab {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 8px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #d8d8d8;
            text-align: left;
            cursor: pointer;
            transition: background .15s, color .15s;
            font-size: 14px;
        }
        .settings-tab:hover {
            background: #2b2d34;
        }
        .settings-tab.active {
            background: #3b82f6;
            color: #fff;
        }
        .settings-content {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            color: #e9eaec;
        }
        .settings-content h2 {
            margin-top: 0;
            font-size: 26px;
            margin-bottom: 22px;
            font-weight: 600;
        }
        .setting-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .setting-row span {
            color: #c7c7c7;
            font-size: 13px;
            font-weight: 500;
        }
        .setting-row select,
        .setting-row input[type="text"],
        .setting-row input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #40434a;
            background: #2a2c33;
            color: #fff;
            outline: none;
            font-size: 13px;
            transition: border-color .15s;
        }
        .setting-row select:focus,
        .setting-row input:focus {
            border-color: #4f8dff;
        }
        .setting-row input[type="range"] {
            width: 100%;
            accent-color: #3b82f6;
            background: transparent;
            cursor: pointer;
        }
        .settings-content .settings-danger {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            background: #4d2020;
            color: #ffd0d0;
            cursor: pointer;
            font-size: 13px;
            transition: background .15s;
        }
        .settings-content .settings-danger:hover {
            background: #6d2929;
        }
        .settings-engine-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }
        .settings-engine-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #26282f;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .15s, background .15s;
        }
        .settings-engine-row:hover {
            background: #2e3038;
        }
        .settings-engine-row.selected {
            border-color: var(--accent-dim);
            background: #1f2a28;
        }
        .settings-engine-row .e-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex: 0 0 auto;
        }
        .settings-engine-row .e-label {
            flex: 1;
            font-size: 14px;
        }
        .settings-engine-row .e-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid #5a5d66;
            flex: 0 0 auto;
            position: relative;
            transition: border-color .15s;
        }
        .settings-engine-row.selected .e-radio {
            border-color: var(--accent-dim);
        }
        .settings-engine-row.selected .e-radio::after {
            content: "";
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: var(--accent-dim);
        }
        .settings-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        /* ─── Language labels ─── */
        [data-i18n] {
            transition: opacity .2s;
        }

        /* ─── Responsive ─── */
        @media (max-width: 900px) {
            .settings-window {
                width: 95vw;
                height: 92vh;
            }
            .settings-sidebar {
                width: 180px;
            }
        }
        @media (max-width: 650px) {
            .settings-window {
                width: 100vw;
                height: 100vh;
                border-radius: 0;
                max-height: 100vh;
            }
            .settings-sidebar {
                width: 70px;
                padding: 10px;
            }
            .settings-tab {
                font-size: 11px;
                padding: 10px 6px;
                text-align: center;
                word-break: break-all;
            }
            .settings-content {
                padding: 18px;
            }
            .sidebar {
                width: 46px;
            }
            .bm {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }
            .brand {
                display: none;
            }
            .ext-btn {
                display: none;
            }
        }
        @media (max-width: 480px) {
            .tab {
                min-width: 70px;
                max-width: 100px;
                font-size: 11px;
                padding: 5px 8px;
            }
            .tab .t-close {
                width: 14px;
                height: 14px;
                font-size: 10px;
            }
            .traffic button {
                width: 11px;
                height: 11px;
            }
            .address-wrap {
                padding: 0 6px 0 10px;
                height: 28px;
            }
            #address {
                font-size: 11px;
            }
            .toolbar {
                gap: 6px;
                padding: 6px 10px;
            }
            .nav-btn {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
            .newtab .search-container {
                width: 90%;
            }
            .newtab #newtab-search {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="shell">

            <!-- ===== SETUP WIZARD ===== -->
            <div id="setup">
                <div class="su-titlebar">
                    <div class="traffic">
                        <button class="r"></button>
                        <button class="y"></button>
                        <button class="g"></button>
                    </div>
                </div>
                <div class="su-body">

                    <div class="su-screen active" data-screen="1">
                        <p class="su-eyebrow" data-i18n="welcome_to">Welcome to</p>
                        <div class="su-logo"><img src="asset/icon.png" alt="B-Browser" /></div>
                        <div><button class="su-btn" id="btnStart" data-i18n="setup_btn">Setup</button></div>
                    </div>

                    <div class="su-screen" data-screen="2">
                        <h1 data-i18n="choose_engine">Choose your search engine</h1>
                        <div class="engine-list" id="engineList"></div>
                        <div style="margin-top:24px;">
                            <button class="su-btn" id="btnEngineDone" data-i18n="continue_btn">Continue</button>
                        </div>
                    </div>

                    <div class="su-screen" data-screen="3">
                        <h1 data-i18n="login_title">Login / Register</h1>
                        <div class="account-stack" id="accountStack">
                            <button class="account-btn" data-mode="register" data-i18n="register_btn">Register</button>
                            <button class="account-btn" data-mode="login" data-i18n="login_btn">Login</button>
                            <button class="account-btn" id="btnSkip" data-i18n="skip_btn">Skip</button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- ===== BROWSER UI ===== -->
            <div class="titlebar">
                <div class="traffic">
                    <button class="r" id="tlClose" title="Close window"></button>
                    <button class="y" id="tlMin" title="Close tab"></button>
                    <button class="g" id="tlMax" title="Fullscreen"></button>
                </div>
                <div class="tabs" id="tabs"></div>
                <button class="tab-add" id="addTab" title="New tab">+</button>
                <div class="brand"><img src="asset/icon.png" alt="B" /></div>
            </div>

            <div class="toolbar">
                <button class="nav-btn" id="btnBack" title="Back">‹</button>
                <button class="nav-btn" id="btnFwd" title="Forward">›</button>
                <button class="nav-btn" id="btnReload" title="Reload">⟳</button>
                <div class="address-wrap">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
                    <input id="address" placeholder="Search or enter url" autocomplete="off" spellcheck="false" data-i18n-placeholder="address_placeholder"/>
                    <button class="star-btn" id="btnStar" title="Bookmark">★</button>
                </div>
                <button class="ext-btn" id="btnAccount" data-i18n="account_btn">Account</button>
                <div class="acct-dropdown" id="acctDropdown">
                    <div class="acct-stack" id="acctStack">
                        <button class="account-btn" data-mode="signin" data-i18n="signin_btn">Sign in</button>
                        <button class="account-btn" data-mode="register" data-i18n="create_account_btn">Create account</button>
                    </div>
                </div>
            </div>

            <div class="body">
                <div class="sidebar">
                    <div class="sidebar-scroll" id="sidebar"></div>
                    <button class="bm settings-btn" id="btnSettings" title="Settings">⚙</button>
                </div>
                <div class="content" id="content">
                    <div class="fallback" id="fallback">
                        <span data-i18n="fallback_msg">Site may refuse to load in-page.</span>
                        <a id="fallbackLink" href="#" target="_blank" rel="noopener" data-i18n="open_directly">Open directly ↗</a>
                        <button id="fallbackClose">✕</button>
                    </div>
                </div>
            </div>

            <!-- ===== SETTINGS MODAL (POP-UP) ===== -->
            <div class="settings-modal" id="settingsModal">
                <div class="settings-window">
                    <div class="settings-titlebar">
                        <span data-i18n="settings_title">⚙ Settings</span>
                        <button id="settingsCloseBtn" title="Close">✕</button>
                    </div>
                    <div class="settings-body">
                        <div class="settings-sidebar">
                            <button class="settings-tab active" data-tab="general" data-i18n="settings_general">General</button>
                            <button class="settings-tab" data-tab="search" data-i18n="settings_search">Search Engine</button>
                            <button class="settings-tab" data-tab="bookmarks" data-i18n="settings_bookmarks">Bookmarks</button>
                            <button class="settings-tab" data-tab="privacy" data-i18n="settings_privacy">Privacy</button>
                        </div>
                        <div class="settings-content" id="settingsContent">
                            <!-- General -->
                            <div class="settings-tab-panel" data-panel="general">
                                <h2 data-i18n="settings_general_title">General</h2>
                                <label class="setting-row">
                                    <span data-i18n="settings_language">Language</span>
                                    <select id="languageSelect">
                                        <option value="en-US">English (US)</option>
                                        <option value="en-GB">English (UK)</option>
                                        <option value="vi-VN">Tiếng Việt</option>
                                        <option value="ja-JP">日本語</option>
                                        <option value="ko-KR">한국어</option>
                                        <option value="zh-CN">简体中文</option>
                                        <option value="zh-TW">繁體中文</option>
                                        <option value="fr-FR">Français</option>
                                        <option value="de-DE">Deutsch</option>
                                        <option value="es-ES">Español</option>
                                    </select>
                                </label>
                                <label class="setting-row">
                                    <span data-i18n="settings_theme">Theme</span>
                                    <select id="themeSelect">
                                        <option value="system" data-i18n="theme_system">System</option>
                                        <option value="dark" data-i18n="theme_dark">Dark</option>
                                        <option value="light" data-i18n="theme_light">Light</option>
                                    </select>
                                </label>
                                <label class="setting-row">
                                    <span data-i18n="settings_zoom">Zoom: <span id="zoomLabel">100%</span></span>
                                    <input id="zoomRange" type="range" min="50" max="200" value="100" />
                                </label>
                            </div>

                            <!-- Search Engine -->
                            <div class="settings-tab-panel" data-panel="search" style="display:none;">
                                <h2 data-i18n="settings_search_title">Search Engine</h2>
                                <div id="settingsEngineList" class="settings-engine-list"></div>
                            </div>

                            <!-- Bookmarks -->
                            <div class="settings-tab-panel" data-panel="bookmarks" style="display:none;">
                                <h2 data-i18n="settings_bookmarks_title">Bookmarks</h2>
                                <p style="color:var(--muted);margin-bottom:16px;" data-i18n="bookmarks_desc">Manage your saved bookmarks.</p>
                                <button class="settings-danger" id="btnClearBookmarks" data-i18n="clear_bookmarks_btn">Clear All Bookmarks</button>
                            </div>

                            <!-- Privacy -->
                            <div class="settings-tab-panel" data-panel="privacy" style="display:none;">
                                <h2 data-i18n="settings_privacy_title">Privacy</h2>
                                <label class="setting-row">
                                    <span data-i18n="clear_data_label">Clear browsing data</span>
                                    <button class="settings-danger" id="btnClearData" style="width:auto;padding:10px 20px;" data-i18n="clear_data_btn">Clear History &amp; Cache</button>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

            };

            var currentLang = "en-US";

            /* ─── I18n ─── */
            function i18n(key) {
                var t = TRANSLATIONS[currentLang];
                return (t && t[key]) || key;
            }

            function updateUI() {
                var els = document.querySelectorAll("[data-i18n]");
                els.forEach(function(el) {
                    var key = el.getAttribute("data-i18n");
                    el.textContent = i18n(key);
                });
                var placeholders = document.querySelectorAll("[data-i18n-placeholder]");
                placeholders.forEach(function(el) {
                    var key = el.getAttribute("data-i18n-placeholder");
                    el.placeholder = i18n(key);
                });
                // Update new tab search placeholder
                var searchInputs = document.querySelectorAll("#newtab-search");
                searchInputs.forEach(function(inp) {
                    inp.placeholder = i18n("address_placeholder");
                });
            }

            /* ─── Search Engines ─── */
            var ENGINES = {
                google: { name: "Google", color: "#fff", icon: "G", fg: "#4285F4",
                    url: function(q) { return "https://www.google.com/search?q=" + encodeURIComponent(q); } },
                duckduckgo: { name: "DuckDuckGo", color: "#DE5833", icon: "D", fg: "#fff",
                    url: function(q) { return "https://duckduckgo.com/?q=" + encodeURIComponent(q); } },
                bing: { name: "Bing", color: "#008373", icon: "b", fg: "#fff",
                    url: function(q) { return "https://www.bing.com/search?q=" + encodeURIComponent(q); } },
                yahoo: { name: "Yahoo!", color: "#6001D2", icon: "!", fg: "#fff",
                    url: function(q) { return "https://search.yahoo.com/search?p=" + encodeURIComponent(q); } },
                amazon: { name: "Amazon", color: "#111", icon: "a", fg: "#FF9900",
                    url: function(q) { return "https://www.amazon.com/s?k=" + encodeURIComponent(q); } },
                wikipedia: { name: "Wikipedia", color: "#fff", icon: "W", fg: "#111",
                    url: function(q) { return "https://en.wikipedia.org/wiki/Special:Search?search=" + encodeURIComponent(
                            q); } }
            };
            var ENGINE_ORDER = ["google", "duckduckgo", "bing", "yahoo", "amazon", "wikipedia"];

            var state = {
                engine: "google",
                tabs: [],
                activeId: null,
                nextId: 1,
                bookmarks: [
                    { title: "Wikipedia", url: "https://en.wikipedia.org" },
                    { title: "Hacker News", url: "https://news.ycombinator.com" },
                    { title: "Internet Archive", url: "https://archive.org" },
                    { title: "Example", url: "https://example.com" }
                ],
                history: [],
                settingsTab: "general"
            };

            /* ─── DOM refs ─── */
            var $ = function(id) { return document.getElementById(id); };
            var tabsEl = $("tabs"),
                contentEl = $("content"),
                sidebarEl = $("sidebar");
            var addressEl = $("address"),
                fallbackEl = $("fallback"),
                fallbackLink = $("fallbackLink");
            var settingsModal = $("settingsModal"),
                settingsClose = $("settingsCloseBtn");
            var settingsContent = $("settingsContent");

            function hostname(u) {
                try { return new URL(u).hostname; } catch (e) { return ""; }
            }

            function faviconFor(u) {
                var h = hostname(u);
                return h ? "https://www.google.com/s2/favicons?sz=64&domain=" + h : "";
            }

            function looksLikeUrl(input) {
                var s = input.trim();
                if (/^https?:\/\//i.test(s)) return true;
                if (/^[a-z0-9-]+(\.[a-z0-9-]+)+(:\d+)?(\/\S*)?$/i.test(s) && !s.includes(" ")) return true;
                return false;
            }

            function normalizeUrl(input) {
                var s = input.trim();
                if (/^https?:\/\//i.test(s)) return s;
                return "https://" + s;
            }

            function resolveInput(input) {
                var s = input.trim();
                if (!s) return null;
                if (looksLikeUrl(s)) return normalizeUrl(s);
                return ENGINES[state.engine].url(s);
            }

            /* ─── Tabs ─── */
            function newTabObj(url) {
                var id = state.nextId++;
                return { id: id, url: url || "", title: url ? hostname(url) : i18n("new_tab"), history: [],
                    histIndex: -1,
                    starred: false, iframe: null, node: null, pageEl: null };
            }

            function createTab(url) {
                var tab = newTabObj(url);
                state.tabs.push(tab);
                var page;
                if (url) {
                    page = document.createElement("iframe");
                    page.className = "";
                    page.setAttribute("referrerpolicy", "no-referrer");
                    page.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups");
                    page.src = url;
                    contentEl.appendChild(page);
                    tab.iframe = page;
                    tab.history.push(url);
                    tab.histIndex = 0;
                } else {
                    page = document.createElement("div");
                    page.className = "newtab";
                    page.innerHTML = `
                        <img class="nb-logo" src="asset/B-Browser-logo.png" alt="B-Browser" />
                        <div class="search-container">
                            <input id="newtab-search" type="text" placeholder="${i18n('address_placeholder')}" autocomplete="off" />
                            <button class="search-btn" id="newtab-search-btn">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="7"/>
                                    <path d="M21 21l-4.3-4.3"/>
                                </svg>
                            </button>
                        </div>
                    `;
                    contentEl.appendChild(page);
                    tab.iframe = null;
                    tab.node = page;

                    var searchInput = page.querySelector("#newtab-search");
                    var searchBtn = page.querySelector("#newtab-search-btn");
                    if (searchInput) {
                        searchInput.addEventListener("keydown", function(e) {
                            if (e.key === "Enter") {
                                e.preventDefault();
                                var query = this.value;
                                var url = resolveInput(query);
                                if (url) go(url);
                            }
                        });
                        searchInput.placeholder = i18n("address_placeholder");
                    }
                    if (searchBtn) {
                        searchBtn.addEventListener("click", function() {
                            var input = this.parentElement.querySelector("#newtab-search");
                            if (input) {
                                var query = input.value;
                                var url = resolveInput(query);
                                if (url) go(url);
                            }
                        });
                    }
                }
                tab.pageEl = page;
                switchTab(tab.id);
                return tab;
            }

            function findTab(id) {
                for (var i = 0; i < state.tabs.length; i++) {
                    if (state.tabs[i].id === id) return state.tabs[i];
                }
                return null;
            }

            function switchTab(id) {
                state.activeId = id;
                state.tabs.forEach(function(t) {
                    if (t.pageEl) t.pageEl.classList.toggle("active", t.id === id);
                });
                renderTabs();
                var tab = findTab(id);
                if (tab) {
                    addressEl.value = tab.url || "";
                    $("btnStar").classList.toggle("active", !!tab.starred);
                    updateNavButtons();
                }
                fallbackEl.classList.remove("show");
            }

            function closeTab(id) {
                var idx = state.tabs.findIndex(function(t) { return t.id === id; });
                if (idx === -1) return;
                var tab = state.tabs[idx];
                if (tab.pageEl) tab.pageEl.remove();
                state.tabs.splice(idx, 1);
                if (state.tabs.length === 0) {
                    createTab(null);
                    return;
                }
                if (state.activeId === id) {
                    var next = state.tabs[Math.max(0, idx - 1)];
                    switchTab(next.id);
                } else {
                    renderTabs();
                }
            }

            function renderTabs() {
                tabsEl.innerHTML = "";
                state.tabs.forEach(function(tab) {
                    var t = document.createElement("div");
                    t.className = "tab" + (state.activeId === tab.id ? " active" : "");
                    var fav = tab.url ? '<img class="favicon" src="' + faviconFor(tab.url) + '" />' : "";
                    var title = tab.title.length > 30 ? tab.title.substring(0, 27) + "..." : tab.title;
                    t.innerHTML = fav + '<span class="t-title">' + title +
                        '</span><button class="t-close">×</button>';
                    t.onclick = function() { switchTab(tab.id); };
                    t.querySelector(".t-close").onclick = function(e) { e.stopPropagation();
                        closeTab(tab.id); };
                    tabsEl.appendChild(t);
                });
            }

            function updateNavButtons() {
                var tab = findTab(state.activeId);
                if (!tab) return;
                $("btnBack").disabled = tab.histIndex <= 0;
                $("btnFwd").disabled = tab.histIndex >= tab.history.length - 1;
            }

            function go(url) {
                var tab = findTab(state.activeId);
                if (!tab) return;
                if (!tab.iframe) {
                    if (tab.pageEl) tab.pageEl.remove();
                    var page = document.createElement("iframe");
                    page.setAttribute("referrerpolicy", "no-referrer");
                    page.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups");
                    page.className = "active";
                    contentEl.appendChild(page);
                    tab.iframe = page;
                    tab.pageEl = page;
                    tab.node = null;
                }
                if (tab.iframe) {
                    try { tab.iframe.src = url; } catch (e) { /* ignore */ }
                }
                tab.url = url;
                tab.title = hostname(url) || url;
                var idx = tab.history.indexOf(url);
                if (idx !== -1) {
                    tab.histIndex = idx;
                } else {
                    tab.history.splice(tab.histIndex + 1);
                    tab.history.push(url);
                    tab.histIndex = tab.history.length - 1;
                }
                renderTabs();
                addressEl.value = url;
                updateNavButtons();
                state.history.push({ url: url, time: Date.now() });
            }

            /* ─── Bookmarks ─── */
            function renderBookmarks() {
                sidebarEl.innerHTML = "";
                state.bookmarks.forEach(function(bm) {
                    var btn = document.createElement("button");
                    btn.className = "bm";
                    btn.title = bm.title;
                    btn.textContent = bm.title.charAt(0).toUpperCase();
                    btn.onclick = function() { createTab(bm.url); };
                    sidebarEl.appendChild(btn);
                });
            }

            /* ─── Setup Wizard ─── */
            var setupEl = $("setup");

            function showSetupScreen(n) {
                document.querySelectorAll(".su-screen").forEach(function(s) { s.classList.remove("active"); });
                var el = document.querySelector('.su-screen[data-screen="' + n + '"]');
                if (el) el.classList.add("active");
            }

            function endSetup() {
                setupEl.style.display = "none";
            }

            var engineListEl = $("engineList");
            ENGINE_ORDER.forEach(function(key) {
                var eng = ENGINES[key];
                var div = document.createElement("div");
                div.className = "engine-row" + (key === state.engine ? " selected" : "");
                div.innerHTML = '<span class="e-icon" style="background:' + eng.color + ';color:' + eng.fg + ';">' + eng
                    .icon + '</span><span class="label">' + eng.name +
                    '</span><div class="radio"></div>';
                div.onclick = function() {
                    state.engine = key;
                    document.querySelectorAll(".engine-row").forEach(function(e) { e.classList.remove("selected"); });
                    this.classList.add("selected");
                };
                engineListEl.appendChild(div);
            });

            $("btnStart").onclick = function() { showSetupScreen(2); };
            $("btnEngineDone").onclick = function() { showSetupScreen(3); };
            $("btnSkip").onclick = function() { endSetup(); };

            /* ─── Account dropdown ─── */
            var acctDropdown = $("acctDropdown");
            $("btnAccount").onclick = function(e) {
                e.stopPropagation();
                acctDropdown.classList.toggle("show");
            };
            document.addEventListener("click", function(e) {
                if (!acctDropdown.contains(e.target) && e.target !== $("btnAccount")) {
                    acctDropdown.classList.remove("show");
                }
            });

            /* ─── Settings Modal (pop-up) ─── */
            function openSettings() {
                settingsModal.classList.add("show");
                renderSettingsEngines();
                var zoomVal = parseInt($("zoomRange").value, 10);
                $("zoomLabel").textContent = zoomVal + "%";
                switchSettingsTab(state.settingsTab || "general");
                var langSelect = $("languageSelect");
                if (langSelect) langSelect.value = currentLang;
            }

            function closeSettings() {
                settingsModal.classList.remove("show");
            }

            $("btnSettings").onclick = function(e) {
                e.stopPropagation();
                openSettings();
                this.classList.toggle("active");
            };

            settingsClose.onclick = closeSettings;
            settingsModal.addEventListener("click", function(e) {
                if (e.target === settingsModal) closeSettings();
            });
            document.addEventListener("keydown", function(e) {
                if (e.key === "Escape" && settingsModal.classList.contains("show")) closeSettings();
            });

            var settingsTabBtns = document.querySelectorAll(".settings-tab");
            settingsTabBtns.forEach(function(btn) {
                btn.onclick = function() {
                    var tab = this.dataset.tab;
                    state.settingsTab = tab;
                    switchSettingsTab(tab);
                };
            });

            function switchSettingsTab(tab) {
                settingsTabBtns.forEach(function(b) { b.classList.toggle("active", b.dataset.tab === tab); });
                var panels = settingsContent.querySelectorAll(".settings-tab-panel");
                panels.forEach(function(p) {
                    p.style.display = p.dataset.panel === tab ? "block" : "none";
                });
            }

            function renderSettingsEngines() {
                var container = $("settingsEngineList");
                if (!container) return;
                container.innerHTML = "";
                ENGINE_ORDER.forEach(function(key) {
                    var eng = ENGINES[key];
                    var div = document.createElement("div");
                    div.className = "settings-engine-row" + (key === state.engine ? " selected" : "");
                    div.innerHTML = '<span class="e-icon" style="background:' + eng.color + ';color:' + eng.fg +
                        ';">' + eng.icon + '</span><span class="e-label">' + eng.name +
                        '</span><span class="e-radio"></span>';
                    div.onclick = function() {
                        state.engine = key;
                        document.querySelectorAll(".settings-engine-row").forEach(function(e) {
                            e.classList.remove("selected");
                        });
                        this.classList.add("selected");
                        document.querySelectorAll("#engineList .engine-row").forEach(function(e) {
                            e.classList.remove("selected");
                            if (e.textContent.trim().startsWith(eng.name)) e.classList.add("selected");
                        });
                    };
                    container.appendChild(div);
                });
            }

            /* ─── Language switching ─── */
            function setLanguage(lang) {
                if (TRANSLATIONS[lang]) {
                    currentLang = lang;
                    updateUI();
                    document.querySelectorAll("#newtab-search").forEach(function(inp) {
                        inp.placeholder = i18n("address_placeholder");
                    });
                    state.tabs.forEach(function(tab) {
                        if (!tab.url || tab.url === "") {
                            tab.title = i18n("new_tab");
                        }
                    });
                    renderTabs();
                }
            }

            /* ─── Event listeners ─── */
            $("addTab").onclick = function() { createTab(null); };

            /* ── TRAFFIC LIGHT CONTROLS ── */
            // RED: Close the entire browser window
            $("tlClose").onclick = function() {
                try {
                    window.close();
                } catch (e) {
                    // If window.close() fails, fallback to closing the current tab
                    if (state.tabs.length > 0) closeTab(state.activeId);
                }
            };

            // YELLOW/AMBER: Close the current tab (hide it)
            $("tlMin").onclick = function() {
                if (state.tabs.length > 0) {
                    closeTab(state.activeId);
                }
            };

            // GREEN: Toggle fullscreen
            $("tlMax").onclick = function() {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(function() {});
                } else {
                    document.exitFullscreen().catch(function() {});
                }
            };

            $("btnBack").onclick = function() {
                var tab = findTab(state.activeId);
                if (tab && tab.histIndex > 0) { tab.histIndex--;
                    go(tab.history[tab.histIndex]); }
            };

            $("btnFwd").onclick = function() {
                var tab = findTab(state.activeId);
                if (tab && tab.histIndex < tab.history.length - 1) { tab.histIndex++;
                    go(tab.history[tab.histIndex]); }
            };

            $("btnReload").onclick = function() {
                var tab = findTab(state.activeId);
                if (tab && tab.iframe) {
                    try { tab.iframe.src = tab.url; } catch (e) { /* ignore */ }
                }
            };

            addressEl.onkeydown = function(e) {
                if (e.key === "Enter") {
                    var url = resolveInput(this.value);
                    if (url) go(url);
                }
            };

            $("btnStar").onclick = function() {
                var tab = findTab(state.activeId);
                if (tab && tab.url) {
                    tab.starred = !tab.starred;
                    this.classList.toggle("active");
                    if (tab.starred) {
                        var exists = state.bookmarks.some(function(b) { return b.url === tab.url; });
                        if (!exists) {
                            state.bookmarks.push({ title: tab.title || hostname(tab.url) || tab.url, url: tab.url });
                            renderBookmarks();
                        }
                    } else {
                        state.bookmarks = state.bookmarks.filter(function(b) { return b.url !== tab.url; });
                        renderBookmarks();
                    }
                }
            };

            $("btnClearBookmarks").onclick = function() {
                if (confirm(i18n("clear_bookmarks_btn") + "?")) {
                    state.bookmarks = [];
                    renderBookmarks();
                }
            };

            $("btnClearData").onclick = function() {
                if (confirm(i18n("clear_data_btn") + "?")) {
                    state.history = [];
                    state.tabs.forEach(function(tab) {
                        tab.history = [];
                        tab.histIndex = -1;
                        if (tab.iframe) {
                            try { tab.iframe.src = "about:blank"; } catch (e) { /* ignore */ }
                        }
                    });
                    alert(i18n("clear_data_btn") + " " + i18n("settings_privacy_title"));
                }
            };

            /* ─── Zoom ─── */
            $("zoomRange").oninput = function() {
                var val = this.value;
                $("zoomLabel").textContent = val + "%";
                var content = document.querySelector(".content");
                if (content) {
                    content.style.zoom = (val / 100);
                }
            };

            /* ─── Theme ─── */
            $("themeSelect").onchange = function() {
                var theme = this.value;
                var root = document.documentElement;
                if (theme === "dark") {
                    root.style.setProperty("--frame", "#0d0e10");
                    root.style.setProperty("--titlebar", "#17181c");
                    root.style.setProperty("--toolbar", "#1d1f24");
                    root.style.setProperty("--sidebar", "#17181c");
                    root.style.setProperty("--line", "#2a2c32");
                    root.style.setProperty("--ink", "#e9eaec");
                    root.style.setProperty("--muted", "#8b8f97");
                    root.style.setProperty("--content-bg", "#ffffff");
                } else if (theme === "light") {
                    root.style.setProperty("--frame", "#f0f0f2");
                    root.style.setProperty("--titlebar", "#e8e8ea");
                    root.style.setProperty("--toolbar", "#dfdfe2");
                    root.style.setProperty("--sidebar", "#e8e8ea");
                    root.style.setProperty("--line", "#c5c5c8");
                    root.style.setProperty("--ink", "#1c1d1f");
                    root.style.setProperty("--muted", "#6a6e77");
                    root.style.setProperty("--content-bg", "#ffffff");
                } else {
                    root.style.setProperty("--frame", "#0d0e10");
                    root.style.setProperty("--titlebar", "#17181c");
                    root.style.setProperty("--toolbar", "#1d1f24");
                    root.style.setProperty("--sidebar", "#17181c");
                    root.style.setProperty("--line", "#2a2c32");
                    root.style.setProperty("--ink", "#e9eaec");
                    root.style.setProperty("--muted", "#8b8f97");
                    root.style.setProperty("--content-bg", "#ffffff");
                }
            };

            /* ─── Language selector in settings ─── */
            $("languageSelect").onchange = function() {
                var lang = this.value;
                setLanguage(lang);
                if (setupEl.style.display !== "none") {
                    updateUI();
                }
            };

            /* ─── Fallback ─── */
            $("fallbackClose").onclick = function() {
                fallbackEl.classList.remove("show");
            };

            /* ─── Init ─── */
            var browserLang = navigator.language || "en-US";
            if (TRANSLATIONS[browserLang]) {
                currentLang = browserLang;
            } else {
                var base = browserLang.split("-")[0];
                var found = false;
                for (var key in TRANSLATIONS) {
                    if (key.startsWith(base)) { currentLang = key;
                        found = true; break; }
                }
                if (!found) currentLang = "en-US";
            }

            updateUI();

            createTab(null);
            renderBookmarks();
            renderSettingsEngines();

            var themeSelect = $("themeSelect");
            if (themeSelect) themeSelect.value = "system";

            var langSelect = $("languageSelect");
            if (langSelect) langSelect.value = currentLang;

            console.log("B-Browser ready. Language:", currentLang);
        })();
    </script>
</body>
</html>
